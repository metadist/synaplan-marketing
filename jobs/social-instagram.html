      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #888;
      font-family: 'Inter', sans-serif;
    }

    .card {
      width: 1080px;
      height: 1080px;
      background: #f2f2f2;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .bird-bg {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 60%;
      height: auto;
      opacity: 1;
    }

    .bird-bg path {
      fill: #d9d9d9;
    }

    .text-block {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 0 100px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    .headline {
      font-size: 64px;
      font-weight: 900;
      line-height: 1.15;
      color: #111;
    }

    .subline {
      font-size: 36px;
      font-weight: 600;
      line-height: 1.4;
      color: #003FC7;
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-top: 20px;
    }

    .logo-bird {
      width: 44px;
      height: auto;
    }

    .logo-bird path {
      fill: #003FC7;
    }

    .logo-label {
      font-size: 22px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: #666;
    }
